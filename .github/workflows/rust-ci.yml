name: Rust CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'rust/**'
      - '.github/workflows/rust-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'rust/**'
      - '.github/workflows/rust-ci.yml'

jobs:
  rust-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('rust/Cargo.lock') }}

      - uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('rust/Cargo.lock') }}

      - uses: actions/cache@v4
        with:
          path: rust/target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('rust/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace --locked --verbose

      - name: Build release binaries
        run: cargo build --workspace --release --locked

      - name: Smoke test CLI binaries
        run: |
          ./target/release/a4 --version
          ./target/release/a4 --help
